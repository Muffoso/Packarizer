<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packarizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            padding: 10px;
            padding-bottom: 100px;
        }

        .auth-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #c9b8a8 0%, #a89f8f 100%);
        }

        .auth-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 400px;
        }

        .auth-container h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #3d3d3d;
            font-size: 24px;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .auth-form input {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            width: 100%;
        }

        .auth-form input:focus {
            outline: none;
            border-color: #9d8b7e;
            box-shadow: 0 0 0 3px rgba(157, 139, 126, 0.1);
        }

        .auth-buttons {
            display: flex;
            gap: 10px;
            flex-direction: column;
        }

        .auth-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .auth-btn.primary {
            background: #7a9b76;
            color: white;
        }

        .auth-btn.primary:hover {
            background: #6a8b66;
        }

        .auth-btn.secondary {
            background: #9d8b7e;
            color: white;
        }

        .auth-btn.secondary:hover {
            background: #8a7968;
        }

        .auth-btn.google {
            background: white;
            color: #3d3d3d;
            border: 1px solid #ddd;
        }

        .auth-btn.google:hover {
            background: #f9f9f9;
        }

        .auth-toggle {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .auth-toggle button {
            background: none;
            border: none;
            color: #7a9b76;
            cursor: pointer;
            text-decoration: underline;
            padding: 0;
            font-size: 14px;
        }

        .auth-error {
            color: #ef4444;
            font-size: 14px;
            text-align: center;
        }

        .auth-hidden {
            display: none !important;
        }

        .app-screen {
            display: none;
        }

        .app-screen.show {
            display: block;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            padding: 20px;
            background: linear-gradient(135deg, #c9b8a8 0%, #a89f8f 100%);
            color: #3d3d3d;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 28px;
            margin: 0;
            font-weight: 600;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #3d3d3d;
        }

        .logout-btn {
            padding: 8px 15px;
            background: white;
            color: #3d3d3d;
            border: 1px solid #3d3d3d;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #3d3d3d;
            color: white;
        }

        .controls {
            display: flex;
            gap: 10px;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
        }

        .toggle-filter {
            background: #9d8b7e;
            color: white;
        }

        .toggle-filter:hover {
            background: #8a7968;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(157, 139, 126, 0.4);
        }

        .toggle-filter.active {
            background: #7a9b76;
        }

        .toggle-edit {
            background: #c4a878;
            color: white;
        }

        .toggle-edit:hover {
            background: #b39666;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(196, 168, 120, 0.4);
        }

        .toggle-edit.active {
            background: #b39666;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .location-section {
            background: white;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .location-header {
            background: linear-gradient(135deg, #9d8b7e 0%, #8a7968 100%);
            color: white;
            padding: 15px;
            font-weight: 600;
            font-size: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .location-header.edit-mode {
            cursor: grab;
        }

        .location-header.edit-mode:active {
            cursor: grabbing;
        }

        .location-controls {
            display: flex;
            gap: 5px;
        }

        .arrow-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .arrow-btn:hover {
            background: rgba(255,255,255,0.4);
        }

        .delete-location-btn {
            background: #ef4444;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .delete-location-btn:hover {
            background: #dc2626;
        }

        .items-list {
            padding: 10px;
            display: none;
        }

        .items-list.show {
            display: block;
        }

        .item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
            gap: 10px;
            transition: background 0.2s;
        }

        .item:last-child {
            border-bottom: none;
        }

        .item.active {
            background: #e8f0e5;
        }

        .item:hover {
            background: #f9fafb;
        }

        .item.edit-mode:hover {
            background: #f0f0f0;
        }

        .item-button {
            flex: 1;
            padding: 12px;
            text-align: left;
            background: none;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }

        .item.active .item-button {
            background: #7a9b76;
            color: white;
            border-color: #7a9b76;
        }

        .item-button:hover {
            border-color: #9d8b7e;
        }

        .item.edit-mode .item-button {
            cursor: grab;
            border: 2px dashed #999;
        }

        .item.edit-mode .item-button:active {
            cursor: grabbing;
        }

        .item-controls {
            display: flex;
            gap: 5px;
        }

        .edit-hidden {
            display: none;
        }

        .edit-mode .edit-hidden {
            display: flex;
        }

        .item-arrow-btn {
            background: #9d8b7e;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .item-arrow-btn:hover {
            background: #8a7968;
        }

        .delete-item-btn {
            background: #ef4444;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .delete-item-btn:hover {
            background: #dc2626;
        }

        .add-item-btn {
            background: #7a9b76;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            margin-top: 10px;
        }

        .add-item-btn:hover {
            background: #6a8b66;
        }

        .add-location-btn {
            background: #7a9b76;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            margin-top: 20px;
        }

        .add-location-btn:hover {
            background: #6a8b66;
        }

        .input-dialog {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .input-dialog.show {
            display: flex;
        }

        .dialog-content {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 20px 25px rgba(0,0,0,0.15);
            width: 90%;
            max-width: 400px;
        }

        .dialog-content h2 {
            margin-bottom: 15px;
            color: #333;
        }

        .dialog-content input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }

        .dialog-buttons {
            display: flex;
            gap: 10px;
        }

        .dialog-buttons button {
            flex: 1;
            padding: 10px;
        }

        .dialog-buttons .cancel-btn {
            background: #9d8b7e;
            color: white;
        }

        .dialog-buttons .confirm-btn {
            background: #7a9b76;
            color: white;
        }

        .filter-active-only {
            display: none;
        }

        .show-active-only .filter-active-only {
            display: block;
        }

        .show-active-only .item:not(.active) {
            display: none;
        }

        .show-active-only .location-section {
            display: none;
        }

        .show-active-only .location-section .item.active {
            display: flex;
        }

        .show-active-only .location-section:has(.item.active) {
            display: block;
        }
    </style>
</head>
<body>
    <!-- Auth Screen -->
    <div class="auth-screen" id="authScreen">
        <div class="auth-container">
            <h1>Packarizer</h1>

            <div id="loginForm">
                <div class="auth-form">
                    <input type="email" id="email" placeholder="Email" />
                    <input type="password" id="password" placeholder="Lösenord" />
                    <button class="auth-btn primary" onclick="login()">Logga in</button>
                    <button class="auth-btn google" onclick="googleSignIn()">🔐 Logga in med Google</button>
                    <div class="auth-error" id="authError"></div>
                </div>
                <div class="auth-toggle">
                    Inget konto? <button onclick="toggleForm()">Registrera</button>
                </div>
            </div>

            <div id="registerForm" class="auth-hidden">
                <div class="auth-form">
                    <input type="email" id="regEmail" placeholder="Email" />
                    <input type="password" id="regPassword" placeholder="Lösenord (minst 6 tecken)" />
                    <input type="password" id="regPasswordConfirm" placeholder="Bekräfta lösenord" />
                    <button class="auth-btn primary" onclick="register()">Skapa konto</button>
                    <button class="auth-btn google" onclick="googleSignIn()">🔐 Registrera med Google</button>
                    <div class="auth-error" id="authError2"></div>
                </div>
                <div class="auth-toggle">
                    Redan konto? <button onclick="toggleForm()">Logga in</button>
                </div>
            </div>
        </div>
    </div>

    <!-- App Screen -->
    <div class="app-screen" id="appScreen">
        <div class="header">
            <h1>Packarizer</h1>
            <div class="user-info">
                <span id="userEmail"></span>
                <button class="logout-btn" onclick="logout()">Logga ut</button>
            </div>
        </div>

        <div class="container" id="container"></div>

        <div class="controls">
            <button class="toggle-filter" id="toggleFilter" title="Visa endast aktiva saker">📋 Aktiva</button>
            <button class="toggle-edit" id="toggleEdit" title="Redigeringsläge">✏️ Redigera</button>
        </div>

        <div class="input-dialog" id="inputDialog">
            <div class="dialog-content">
                <h2 id="dialogTitle"></h2>
                <input type="text" id="dialogInput" placeholder="Namn">
                <div class="dialog-buttons">
                    <button class="cancel-btn" onclick="closeDialog()">Avbryt</button>
                    <button class="confirm-btn" onclick="confirmDialog()">OK</button>
                </div>
            </div>
        </div>
    </div>

        };

        // Auth functions (global scope)
        window.toggleForm = function() {
            document.getElementById('loginForm').classList.toggle('auth-hidden');
            document.getElementById('registerForm').classList.toggle('auth-hidden');
            clearAuthErrors();
        };

        function clearAuthErrors() {
            document.getElementById('authError').textContent = '';
            document.getElementById('authError2').textContent = '';
        }

        window.login = function() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                document.getElementById('authError').textContent = 'Fyll i email och lösenord';
                return;
            }

            signInWithEmailAndPassword(auth, email, password)
                .catch(error => {
                    document.getElementById('authError').textContent = 'Fel email eller lösenord';
                    console.error(error);
                });
        };

        window.register = function() {
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const passwordConfirm = document.getElementById('regPasswordConfirm').value;

            if (!email || !password || !passwordConfirm) {
                document.getElementById('authError2').textContent = 'Fyll i alla fält';
                return;
            }

            if (password !== passwordConfirm) {
                document.getElementById('authError2').textContent = 'Lösenorden stämmer inte överens';
                return;
            }

            if (password.length < 6) {
                document.getElementById('authError2').textContent = 'Lösenordet måste vara minst 6 tecken';
                return;
            }

            createUserWithEmailAndPassword(auth, email, password)
                .catch(error => {
                    document.getElementById('authError2').textContent = 'Email redan registrerat eller felaktig email';
                    console.error(error);
                });
        };

        window.googleSignIn = function() {
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider)
                .catch(error => {
                    document.getElementById('authError').textContent = 'Google-inloggning misslyckades';
                    console.error(error);
                });
        };

        window.logout = function() {
            signOut(auth);
        };

        // Initialize new user with default data or empty
        function initializeNewUserData() {
            const uid = auth.currentUser.uid;
            const email = auth.currentUser.email;

            const userLocationsRef = ref(database, `users/${uid}/locations`);
            onValue(userLocationsRef, snapshot => {
                if (!snapshot.exists()) {
                    // Check if this is the special user - load default data
                    if (email === 'stallberg.anders@gmail.com') {
                        set(userLocationsRef, DEFAULT_LOCATIONS);
                    } else {
                        // New user - empty locations
                        set(userLocationsRef, {});
                    }
                }
            }, { onlyOnce: true });
        }

        // Auth state listener
        onAuthStateChanged(auth, user => {
            if (user) {
                currentUser = user;
                dbRef = ref(database, `users/${user.uid}/locations`);

                document.getElementById('authScreen').classList.add('auth-hidden');
                document.getElementById('appScreen').classList.add('show');
                document.getElementById('userEmail').textContent = user.email;

                initializeNewUserData();
                listenToDataChanges();

                // Reset edit and filter
                editMode = false;
                filterActive = false;
                document.getElementById('toggleFilter').classList.remove('active');
                document.getElementById('toggleEdit').classList.remove('active');
            } else {
                currentUser = null;
                dbRef = null;
                locations = [];

                document.getElementById('authScreen').classList.remove('auth-hidden');
                document.getElementById('appScreen').classList.remove('show');
                document.getElementById('email').value = '';
                document.getElementById('password').value = '';
                document.getElementById('regEmail').value = '';
                document.getElementById('regPassword').value = '';
                document.getElementById('regPasswordConfirm').value = '';
            }
        });

        // Real-time database listener
        function listenToDataChanges() {
            onValue(dbRef, snapshot => {
                const data = snapshot.val();
                if (data) {
                    locations = Object.entries(data).map(([name, locationData]) => ({
                        name,
                        order: locationData.order,
                        items: Object.entries(locationData.items || {}).map(([itemName, itemData]) => ({
                            name: itemName,
                            active: itemData.active,
                            order: itemData.order
                        })).sort((a, b) => a.order - b.order)
                    })).sort((a, b) => a.order - b.order);
                } else {
                    locations = [];
                }
                render();
            });
        }

        window.saveAllData = async function() {
            if (!dbRef) return;

            const data = {};
            locations.forEach(location => {
                data[location.name] = {
                    order: location.order,
                    items: {}
                };
                location.items.forEach(item => {
                    data[location.name].items[item.name] = {
                        active: item.active,
                        order: item.order
                    };
                });
            });

            await set(dbRef, data);
        };

        function render() {
            const container = document.getElementById('container');
            container.innerHTML = '';

            locations.forEach((location, locIndex) => {
                const section = document.createElement('div');
                section.className = 'location-section';

                const header = document.createElement('div');
                header.className = `location-header ${editMode ? 'edit-mode' : ''}`;
                header.draggable = editMode;

                header.innerHTML = `
                    <span>${location.name}</span>
                    <div class="location-controls ${editMode ? '' : 'edit-hidden'}">
                        <button class="arrow-btn" onclick="moveLocation(${locIndex}, -1)" ${locIndex === 0 ? 'disabled' : ''}>⬆️</button>
                        <button class="arrow-btn" onclick="moveLocation(${locIndex}, 1)" ${locIndex === locations.length - 1 ? 'disabled' : ''}>⬇️</button>
                        <button class="delete-location-btn" onclick="deleteLocation(${locIndex})">✕</button>
                    </div>
                `;

                header.addEventListener('click', () => {
                    const itemsList = section.querySelector('.items-list');
                    itemsList.classList.toggle('show');
                });

                section.appendChild(header);

                const itemsList = document.createElement('div');
                itemsList.className = 'items-list show';

                location.items.forEach((item, itemIndex) => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = `item ${item.active ? 'active' : ''} ${editMode ? 'edit-mode' : ''}`;

                    itemDiv.innerHTML = `
                        <button class="item-button" onclick="toggleItem(${locIndex}, ${itemIndex})">${item.name}</button>
                        <div class="item-controls edit-hidden">
                            <button class="item-arrow-btn" onclick="moveItem(${locIndex}, ${itemIndex}, -1)" ${itemIndex === 0 ? 'disabled' : ''}>⬆️</button>
                            <button class="item-arrow-btn" onclick="moveItem(${locIndex}, ${itemIndex}, 1)" ${itemIndex === location.items.length - 1 ? 'disabled' : ''}>⬇️</button>
                            <button class="delete-item-btn" onclick="deleteItem(${locIndex}, ${itemIndex})">✕</button>
                        </div>
                    `;

                    itemsList.appendChild(itemDiv);
                });

                if (editMode) {
                    const addItemBtn = document.createElement('button');
                    addItemBtn.className = 'add-item-btn';
                    addItemBtn.textContent = '+ Lägg till sak';
                    addItemBtn.onclick = () => showAddItemDialog(locIndex);
                    itemsList.appendChild(addItemBtn);
                }

                section.appendChild(itemsList);
                container.appendChild(section);
            });

            if (editMode) {
                const addLocationBtn = document.createElement('button');
                addLocationBtn.className = 'add-location-btn';
                addLocationBtn.textContent = '+ Lägg till plats';
                addLocationBtn.onclick = () => showAddLocationDialog();
                container.appendChild(addLocationBtn);
            }

            // Apply filter and edit mode classes
            if (filterActive) {
                container.classList.add('show-active-only');
            } else {
                container.classList.remove('show-active-only');
            }

            if (editMode) {
                container.classList.add('edit-mode');
            } else {
                container.classList.remove('edit-mode');
            }
        }

        window.toggleItem = function(locIndex, itemIndex) {
            if (!editMode) {
                locations[locIndex].items[itemIndex].active = !locations[locIndex].items[itemIndex].active;
                window.saveAllData();

                // Scroll to item if not in filter mode
                if (!filterActive) {
                    setTimeout(() => {
                        const items = document.querySelectorAll('.item');
                        let itemElement = null;
                        let itemCount = 0;

                        for (let i = 0; i < locations.length; i++) {
                            for (let j = 0; j < locations[i].items.length; j++) {
                                if (i === locIndex && j === itemIndex) {
                                    itemElement = items[itemCount];
                                    break;
                                }
                                itemCount++;
                            }
                            if (itemElement) break;
                        }

                        if (itemElement) {
                            const rect = itemElement.getBoundingClientRect();
                            const windowHeight = window.innerHeight;
                            const targetPosition = windowHeight * 0.25;
                            const offset = rect.top - targetPosition;
                            window.scrollBy({ top: offset, behavior: 'smooth' });
                        }
                    }, 0);
                }
            }
        };

        window.moveLocation = function(locIndex, direction) {
            const newIndex = locIndex + direction;
            if (newIndex >= 0 && newIndex < locations.length) {
                [locations[locIndex], locations[newIndex]] = [locations[newIndex], locations[locIndex]];
                locations.forEach((loc, i) => loc.order = i);
                window.saveAllData();
            }
        };

        window.moveItem = function(locIndex, itemIndex, direction) {
            const newIndex = itemIndex + direction;
            const items = locations[locIndex].items;
            if (newIndex >= 0 && newIndex < items.length) {
                [items[itemIndex], items[newIndex]] = [items[newIndex], items[itemIndex]];
                items.forEach((item, i) => item.order = i);
                window.saveAllData();
            }
        };

        window.deleteLocation = function(locIndex) {
            if (confirm(`Vill du ta bort "${locations[locIndex].name}"?`)) {
                locations.splice(locIndex, 1);
                locations.forEach((loc, i) => loc.order = i);
                window.saveAllData();
            }
        };

        window.deleteItem = function(locIndex, itemIndex) {
            const itemName = locations[locIndex].items[itemIndex].name;
            if (confirm(`Vill du ta bort "${itemName}"?`)) {
                locations[locIndex].items.splice(itemIndex, 1);
                locations[locIndex].items.forEach((item, i) => item.order = i);
                window.saveAllData();
            }
        };

        window.showAddLocationDialog = function() {
            dialogCallback = (name) => {
                locations.push({
                    name,
                    order: locations.length,
                    items: []
                });
                window.saveAllData();
            };
            document.getElementById('dialogTitle').textContent = 'Lägg till ny plats';
            document.getElementById('dialogInput').value = '';
            document.getElementById('inputDialog').classList.add('show');
            document.getElementById('dialogInput').focus();
        };

        window.showAddItemDialog = function(locIndex) {
            dialogCallback = (name) => {
                const location = locations[locIndex];
                location.items.push({
                    name,
                    active: false,
                    order: location.items.length
                });
                window.saveAllData();
            };
            document.getElementById('dialogTitle').textContent = `Lägg till ny sak i "${locations[locIndex].name}"`;
            document.getElementById('dialogInput').value = '';
            document.getElementById('inputDialog').classList.add('show');
            document.getElementById('dialogInput').focus();
        };

        window.closeDialog = function() {
            document.getElementById('inputDialog').classList.remove('show');
            dialogCallback = null;
        };

        window.confirmDialog = function() {
            const input = document.getElementById('dialogInput').value.trim();
            if (input && dialogCallback) {
                dialogCallback(input);
                window.closeDialog();
            }
        };

        document.getElementById('dialogInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') window.confirmDialog();
        });

        document.getElementById('toggleFilter').addEventListener('click', () => {
            filterActive = !filterActive;
            document.getElementById('toggleFilter').classList.toggle('active', filterActive);
            render();
        });

        document.getElementById('toggleEdit').addEventListener('click', () => {
            editMode = !editMode;
            document.getElementById('toggleEdit').classList.toggle('active', editMode);
            render();
        });
    </script>
</body>
</html>
