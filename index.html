    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f2f0e4;
            padding: 10px;
            padding-bottom: 100px;
            color: #045149;
        }

        .auth-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #045149 0%, #003a37 100%);
        }

        .auth-container {
            background: #f2f0e4;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
        }

        .auth-container h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #045149;
            font-size: 32px;
            font-family: 'Righteous', sans-serif;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .auth-form input {
            padding: 12px;
            border: 2px solid #045149;
            border-radius: 5px;
            font-size: 16px;
            width: 100%;
            background: #e6eaef;
            color: #045149;
            font-family: 'Inter', sans-serif;
        }

        .auth-form input:focus {
            outline: none;
            border-color: #bfdbdd;
            box-shadow: 0 0 0 3px rgba(191, 219, 221, 0.3);
        }

        .auth-buttons {
            display: flex;
            gap: 10px;
            flex-direction: column;
        }

        .auth-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .auth-btn.primary {
            background: #045149;
            color: #f2f0e4;
        }

        .auth-btn.primary:hover {
            background: #003a37;
            transform: translateY(-2px);
        }

        .auth-btn.secondary {
            background: #bfdbdd;
            color: #045149;
        }

        .auth-btn.secondary:hover {
            background: #9ec5c6;
            transform: translateY(-2px);
        }

        .auth-btn.google {
            background: #e6eaef;
            color: #045149;
            border: 2px solid #045149;
        }

        .auth-btn.google:hover {
            background: #dae0e5;
            border-color: #045149;
        }

        .auth-toggle {
            text-align: center;
            margin-top: 20px;
            color: #045149;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
        }

        .auth-toggle button {
            background: none;
            border: none;
            color: #21664d;
            cursor: pointer;
            text-decoration: underline;
            padding: 0;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
        }

        .auth-error {
            color: #045149;
            font-size: 14px;
            text-align: center;
            font-family: 'Inter', sans-serif;
        }

        .auth-hidden {
            display: none !important;
        }

        .app-screen {
            display: none;
            padding-top: 140px;
        }

        .app-screen.show {
            display: block;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: linear-gradient(135deg, #045149 0%, #003a37 100%);
            color: #f2f0e4;
            padding: 15px 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .header h1 {
            font-size: 32px;
            margin: 0 0 10px 0;
            font-weight: 700;
            text-align: center;
            color: #bfdbdd;
            font-family: 'Righteous', sans-serif;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .header-logo {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-logo svg {
            width: 100%;
            height: 100%;
        }

        .header-content {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 800px;
            margin: 0 auto;
        }

        .user-section {
            text-align: center;
            font-size: 13px;
            color: #e6eaef;
            font-family: 'Inter', sans-serif;
        }

        .header-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .toggle-filter {
            background: #21664d;
            color: #f2f0e4;
            padding: 8px 15px;
            font-size: 13px;
        }

        .toggle-filter:hover {
            background: #15543c;
        }

        .toggle-filter.active {
            background: #bfdbdd;
            color: #045149;
        }

        .toggle-edit {
            background: #21664d;
            color: #f2f0e4;
            padding: 8px 15px;
            font-size: 13px;
        }

        .toggle-edit:hover {
            background: #15543c;
        }

        .toggle-edit.active {
            background: #bfdbdd;
            color: #045149;
        }

        .logout-btn {
            padding: 8px 15px;
            background: #bfdbdd;
            color: #045149;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .logout-btn:hover {
            background: #9ec5c6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .location-section {
            background: #e6eaef;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .location-header {
            background: linear-gradient(135deg, #045149 0%, #003a37 100%);
            color: #bfdbdd;
            padding: 15px;
            font-weight: 600;
            font-size: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            font-family: 'Inter', sans-serif;
        }

        .location-header.edit-mode {
            cursor: grab;
        }

        .location-header.edit-mode:active {
            cursor: grabbing;
        }

        .location-controls {
            display: flex;
            gap: 5px;
        }

        .arrow-btn {
            background: rgba(191, 219, 221, 0.2);
            color: #bfdbdd;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .arrow-btn:hover {
            background: rgba(191, 219, 221, 0.4);
        }

        .delete-location-btn {
            background: #21664d;
            color: #f2f0e4;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .delete-location-btn:hover {
            background: #15543c;
        }

        .items-list {
            padding: 10px;
            display: none;
        }

        .items-list.show {
            display: block;
        }

        .item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #dae0e5;
            gap: 10px;
            transition: background 0.2s;
        }

        .item:last-child {
            border-bottom: none;
        }

        .item.active {
            background: #21664d;
        }

        .item:hover {
            background: #f2f0e4;
        }

        .item.edit-mode:hover {
            background: #e6eaef;
        }

        .item-button {
            flex: 1;
            padding: 12px;
            text-align: left;
            background: none;
            border: 2px solid #045149;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
            color: #045149;
            font-family: 'Inter', sans-serif;
        }

        .item.active .item-button {
            background: #21664d;
            color: #f2f0e4;
            border-color: #21664d;
        }

        .item-button:hover {
            border-color: #bfdbdd;
        }

        .item.edit-mode .item-button {
            cursor: grab;
            border: 2px dashed #045149;
        }

        .item.edit-mode .item-button:active {
            cursor: grabbing;
        }

        .item-controls {
            display: flex;
            gap: 5px;
        }

        .edit-hidden {
            display: none;
        }

        .edit-mode .edit-hidden {
            display: flex;
        }

        .item-arrow-btn {
            background: #21664d;
            color: #f2f0e4;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .item-arrow-btn:hover {
            background: #15543c;
        }

        .delete-item-btn {
            background: #bfdbdd;
            color: #045149;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .delete-item-btn:hover {
            background: #9ec5c6;
        }

        .add-item-btn {
            background: #21664d;
            color: #f2f0e4;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            margin-top: 10px;
            font-family: 'Inter', sans-serif;
        }

        .add-item-btn:hover {
            background: #15543c;
        }

        .add-location-btn {
            background: #21664d;
            color: #f2f0e4;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            margin-top: 20px;
            font-family: 'Inter', sans-serif;
        }

        .add-location-btn:hover {
            background: #15543c;
        }

        .input-dialog {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;

            display: flex;
        }

        .dialog-content {
            background: #f2f0e4;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 20px 25px rgba(0,0,0,0.15);
            width: 90%;
            max-width: 400px;
        }

        .dialog-content h2 {
            margin-bottom: 15px;
            color: #045149;
            font-family: 'Inter', sans-serif;
        }

        .dialog-content input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 2px solid #045149;
            border-radius: 5px;
            font-size: 16px;
            background: #e6eaef;
            color: #045149;
            font-family: 'Inter', sans-serif;
        }

        .dialog-buttons {
            display: flex;
            gap: 10px;
        }

        .dialog-buttons button {
            flex: 1;
            padding: 10px;
            font-family: 'Inter', sans-serif;
        }

        .dialog-buttons .cancel-btn {
            background: #21664d;
            color: #f2f0e4;
        }

        .dialog-buttons .cancel-btn:hover {
            background: #15543c;
        }

        .dialog-buttons .confirm-btn {
            background: #bfdbdd;
            color: #045149;
        }

        .dialog-buttons .confirm-btn:hover {
            background: #9ec5c6;
        }

        .filter-active-only {
            display: none;
        }

        .show-active-only .filter-active-only {
            display: block;
        }

        .show-active-only .item:not(.active) {
            display: none;
        }

        .show-active-only .location-section {
            display: none;
        }

        .show-active-only .location-section .item.active {
            display: flex;
        }

        .show-active-only .location-section:has(.item.active) {
            display: block;
        }
    </style>
</head>
<body>
    <!-- Auth Screen -->
    <div class="auth-screen" id="authScreen">
        <div class="auth-container">
            <h1>PACKARIZER</h1>

            <div id="loginForm">
                <div class="auth-form">
                    <input type="email" id="email" placeholder="Email" />
                    <input type="password" id="password" placeholder="Lösenord" />
                    <button class="auth-btn primary" onclick="appLogin()">Logga in</button>
                    <button class="auth-btn secondary" onclick="appGoogleSignIn()">Logga in med Google</button>
                    <div class="auth-error" id="authError"></div>
                </div>
                <div class="auth-toggle">
                    Inget konto? <button onclick="appToggleForm()">Registrera</button>
                </div>
            </div>

            <div id="registerForm" class="auth-hidden">
                <div class="auth-form">
                    <input type="email" id="regEmail" placeholder="Email" />
                    <input type="password" id="regPassword" placeholder="Lösenord (minst 6 tecken)" />
                    <input type="password" id="regPasswordConfirm" placeholder="Bekräfta lösenord" />
                    <button class="auth-btn primary" onclick="appRegister()">Skapa konto</button>
                    <button class="auth-btn secondary" onclick="appGoogleSignIn()">Registrera med Google</button>
                    <div class="auth-error" id="authError2"></div>
                </div>
                <div class="auth-toggle">
                    Redan konto? <button onclick="appToggleForm()">Logga in</button>
                </div>
            </div>
        </div>
    </div>

    <!-- App Screen -->
    <div class="app-screen" id="appScreen">
        <div class="header">
            <h1>
                <div class="header-logo">
                    <svg viewBox="0 0 200 180" xmlns="http://www.w3.org/2000/svg">

                </div>
                PACKARIZER

            <div class="header-content">
                <div class="user-section">
                    <div id="userEmail"></div>
                </div>
                <div class="header-controls">
                    <button class="toggle-filter" id="toggleFilter" title="Visa endast aktiva saker">Visa alla</button>
                    <button class="toggle-edit" id="toggleEdit" title="Redigeringsläge">Redigera</button>
                    <button class="logout-btn" onclick="appLogout()">Logga ut</button>
                </div>
            </div>
        </div>

        <div class="container" id="container"></div>

        <div class="input-dialog" id="inputDialog">
            <div class="dialog-content">
                <h2 id="dialogTitle"></h2>
                <input type="text" id="dialogInput" placeholder="Namn">
                <div class="dialog-buttons">
                    <button class="cancel-btn" onclick="appCloseDialog()">Avbryt</button>
                    <button class="confirm-btn" onclick="appConfirmDialog()">OK</button>
                </div>
            </div>
        </div>
    </div>

            "Urförskidor": { order: 10, items: { "Alpina skidor": { active: false, order: 0 }, "Alpina stavar": { active: false, order: 1 }, "Lavinsändare": { active: false, order: 2 }, "Lavinsond": { active: false, order: 3 }, "Lavinspade": { active: false, order: 4 }, "Liftsittunderlag": { active: false, order: 5 }, "Ryggskydd": { active: false, order: 6 }, "Stighudar": { active: false, order: 7 }, "Skidhjälm": { active: false, order: 8 }, "Liftkort": { active: false, order: 9 }, "Skidglasögon": { active: false, order: 10 } } },
            "Orientering": { order: 11, items: { "Orienteringstights": { active: false, order: 0 }, "Orienteringströja": { active: false, order: 1 }, "Sportidentpinne och kompass": { active: false, order: 2 }, "Orienteringsskor": { active: false, order: 3 }, "Extra kompass": { active: false, order: 4 }, "Laddare gps-klocka": { active: false, order: 5 }, "GPS-klocka": { active: false, order: 6 }, "Tensmaskin": { active: false, order: 7 } } },
            "Cykel": { order: 12, items: { "Cykelverktyg": { active: false, order: 0 }, "Cykelbyxor": { active: false, order: 1 }, "Cykeltröja": { active: false, order: 2 }, "Cykelhjälm": { active: false, order: 3 }, "Cykellås": { active: false, order: 4 }, "Cykelskor": { active: false, order: 5 } } },
            "Tältning": { order: 13, items: { "Sovsäck": { active: false, order: 0 }, "Liggunderlag": { active: false, order: 1 }, "Presenning": { active: false, order: 2 }, "Tält": { active: false, order: 3 } } },
            "Husvagn": { order: 14, items: { "Tvättlina": { active: false, order: 0 }, "Campingbord": { active: false, order: 1 }, "Vattendunkar": { active: false, order: 2 }, "Campingstol": { active: false, order: 3 }, "Grenkontakt": { active: false, order: 4 } } }
        };

        function setupFirebaseListeners() {
            auth = firebase.auth();
            database = firebase.database();

            auth.onAuthStateChanged(user => {
                if (user) {
                    currentUser = user;
                    document.getElementById('authScreen').classList.add('auth-hidden');
                    document.getElementById('appScreen').classList.add('show');
                    document.getElementById('userEmail').textContent = user.email;
                    initializeNewUserData(user);
                    listenToDataChanges(user);
                    editMode = false;
                    filterActive = false;
                    document.getElementById('toggleFilter').classList.remove('active');
                    document.getElementById('toggleFilter').textContent = 'Visa valda';
                    document.getElementById('toggleEdit').classList.remove('active');
                    document.getElementById('toggleEdit').textContent = 'Redigera';
                } else {
                    currentUser = null;
                    locations = [];
                    document.getElementById('authScreen').classList.remove('auth-hidden');
                    document.getElementById('appScreen').classList.remove('show');
                    document.getElementById('email').value = '';
                    document.getElementById('password').value = '';
                    document.getElementById('regEmail').value = '';
                    document.getElementById('regPassword').value = '';
                    document.getElementById('regPasswordConfirm').value = '';
                }
            });
        }

        function initializeNewUserData(user) {
            const uid = user.uid;
            const email = user.email;
            database.ref(`users/${uid}/locations`).once('value', snapshot => {
                if (!snapshot.exists()) {
                    if (email === 'stallberg.anders@gmail.com') {
                        database.ref(`users/${uid}/locations`).set(DEFAULT_LOCATIONS);
                    } else {
                        database.ref(`users/${uid}/locations`).set({});
                    }
                }
            });
        }

        function listenToDataChanges(user) {
            database.ref(`users/${user.uid}/locations`).on('value', snapshot => {
                const data = snapshot.val();
                if (data) {
                    locations = Object.entries(data).map(([name, locationData]) => ({
                        name,
                        order: locationData.order,
                        items: Object.entries(locationData.items || {}).map(([itemName, itemData]) => ({
                            name: itemName,
                            active: itemData.active,
                            order: itemData.order
                        })).sort((a, b) => a.order - b.order)
                    })).sort((a, b) => a.order - b.order);
                } else {
                    locations = [];
                }
                render();
            });
        }

        // Auth functions
        function appToggleForm() {
            document.getElementById('loginForm').classList.toggle('auth-hidden');
            document.getElementById('registerForm').classList.toggle('auth-hidden');
            document.getElementById('authError').textContent = '';
            document.getElementById('authError2').textContent = '';
        }

        function appLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) {
                document.getElementById('authError').textContent = 'Fyll i email och lösenord';
                return;
            }
            auth.signInWithEmailAndPassword(email, password).catch(error => {
                document.getElementById('authError').textContent = 'Fel email eller lösenord';
            });
        }

        function appRegister() {
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const passwordConfirm = document.getElementById('regPasswordConfirm').value;
            if (!email || !password || !passwordConfirm) {
                document.getElementById('authError2').textContent = 'Fyll i alla fält';
                return;
            }
            if (password !== passwordConfirm) {
                document.getElementById('authError2').textContent = 'Lösenorden stämmer inte överens';
                return;
            }
            if (password.length < 6) {
                document.getElementById('authError2').textContent = 'Lösenordet måste vara minst 6 tecken';
                return;
            }
            auth.createUserWithEmailAndPassword(email, password).catch(error => {
                document.getElementById('authError2').textContent = 'Email redan registrerat eller felaktig email';
            });
        }

        function appGoogleSignIn() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(error => {
                document.getElementById('authError').textContent = 'Google-inloggning misslyckades';
            });
        }

        function appLogout() {
            auth.signOut();
        }

        // App functions
        function saveAllData() {
            if (!currentUser) return;
            const data = {};
            locations.forEach(location => {
                data[location.name] = {
                    order: location.order,
                    items: {}
                };
                location.items.forEach(item => {
                    data[location.name].items[item.name] = {
                        active: item.active,
                        order: item.order
                    };
                });
            });
            database.ref(`users/${currentUser.uid}/locations`).set(data);
        }

        function render() {
            const container = document.getElementById('container');
            container.innerHTML = '';

            locations.forEach((location, locIndex) => {
                const section = document.createElement('div');
                section.className = 'location-section';

                const header = document.createElement('div');
                header.className = `location-header ${editMode ? 'edit-mode' : ''}`;

                header.innerHTML = `
                    <span>${location.name}</span>
                    <div class="location-controls ${editMode ? '' : 'edit-hidden'}">
                        <button class="arrow-btn" onclick="appMoveLocation(${locIndex}, -1)" ${locIndex === 0 ? 'disabled' : ''}>⬆️</button>
                        <button class="arrow-btn" onclick="appMoveLocation(${locIndex}, 1)" ${locIndex === locations.length - 1 ? 'disabled' : ''}>⬇️</button>
                        <button class="delete-location-btn" onclick="appDeleteLocation(${locIndex})">✕</button>
                    </div>
                `;

                header.addEventListener('click', () => {
                    const itemsList = section.querySelector('.items-list');
                    itemsList.classList.toggle('show');
                });

                section.appendChild(header);

                const itemsList = document.createElement('div');
                itemsList.className = 'items-list show';

                location.items.forEach((item, itemIndex) => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = `item ${item.active ? 'active' : ''} ${editMode ? 'edit-mode' : ''}`;

                    itemDiv.innerHTML = `
                        <button class="item-button" onclick="appToggleItem(${locIndex}, ${itemIndex})">${item.name}</button>
                        <div class="item-controls edit-hidden">
                            <button class="item-arrow-btn" onclick="appMoveItem(${locIndex}, ${itemIndex}, -1)" ${itemIndex === 0 ? 'disabled' : ''}>⬆️</button>
                            <button class="item-arrow-btn" onclick="appMoveItem(${locIndex}, ${itemIndex}, 1)" ${itemIndex === location.items.length - 1 ? 'disabled' : ''}>⬇️</button>
                            <button class="delete-item-btn" onclick="appDeleteItem(${locIndex}, ${itemIndex})">✕</button>
                        </div>
                    `;

                    itemsList.appendChild(itemDiv);
                });

                if (editMode) {
                    const addItemBtn = document.createElement('button');
                    addItemBtn.className = 'add-item-btn';
                    addItemBtn.textContent = '+ Lägg till sak';
                    addItemBtn.onclick = () => appShowAddItemDialog(locIndex);
                    itemsList.appendChild(addItemBtn);
                }

                section.appendChild(itemsList);
                container.appendChild(section);
            });

            if (editMode) {
                const addLocationBtn = document.createElement('button');
                addLocationBtn.className = 'add-location-btn';
                addLocationBtn.textContent = '+ Lägg till plats';
                addLocationBtn.onclick = () => appShowAddLocationDialog();
                container.appendChild(addLocationBtn);
            }

            if (filterActive) {
                container.classList.add('show-active-only');
            } else {
                container.classList.remove('show-active-only');
            }

            if (editMode) {
                container.classList.add('edit-mode');
            } else {
                container.classList.remove('edit-mode');
            }
        }

        function appToggleItem(locIndex, itemIndex) {
            if (!editMode) {
                locations[locIndex].items[itemIndex].active = !locations[locIndex].items[itemIndex].active;
                saveAllData();

                if (!filterActive) {
                    setTimeout(() => {
                        const items = document.querySelectorAll('.item');
                        let itemElement = null;
                        let itemCount = 0;

                        for (let i = 0; i < locations.length; i++) {
                            for (let j = 0; j < locations[i].items.length; j++) {
                                if (i === locIndex && j === itemIndex) {
                                    itemElement = items[itemCount];
                                    break;
                                }
                                itemCount++;
                            }
                            if (itemElement) break;
                        }

                        if (itemElement) {
                            const rect = itemElement.getBoundingClientRect();
                            const windowHeight = window.innerHeight;
                            const targetPosition = windowHeight * 0.25;
                            const offset = rect.top - targetPosition;
                            window.scrollBy({ top: offset, behavior: 'smooth' });
                        }
                    }, 0);
                }
            }
        }

        function appMoveLocation(locIndex, direction) {
            const newIndex = locIndex + direction;
            if (newIndex >= 0 && newIndex < locations.length) {
                [locations[locIndex], locations[newIndex]] = [locations[newIndex], locations[locIndex]];
                locations.forEach((loc, i) => loc.order = i);
                saveAllData();
            }
        }

        function appMoveItem(locIndex, itemIndex, direction) {
            const newIndex = itemIndex + direction;
            const items = locations[locIndex].items;
            if (newIndex >= 0 && newIndex < items.length) {
                [items[itemIndex], items[newIndex]] = [items[newIndex], items[itemIndex]];
                items.forEach((item, i) => item.order = i);
                saveAllData();
            }
        }

        function appDeleteLocation(locIndex) {
            if (confirm(`Vill du ta bort "${locations[locIndex].name}"?`)) {
                locations.splice(locIndex, 1);
                locations.forEach((loc, i) => loc.order = i);
                saveAllData();
            }
        }

        function appDeleteItem(locIndex, itemIndex) {
            const itemName = locations[locIndex].items[itemIndex].name;
            if (confirm(`Vill du ta bort "${itemName}"?`)) {
                locations[locIndex].items.splice(itemIndex, 1);
                locations[locIndex].items.forEach((item, i) => item.order = i);
                saveAllData();
            }
        }

        function appShowAddLocationDialog() {
            dialogCallback = (name) => {
                locations.push({
                    name,
                    order: locations.length,
                    items: []
                });
                saveAllData();
            };
            document.getElementById('dialogTitle').textContent = 'Lägg till ny plats';
            document.getElementById('dialogInput').value = '';
            document.getElementById('inputDialog').classList.add('show');
            document.getElementById('dialogInput').focus();
        }

        function appShowAddItemDialog(locIndex) {
            dialogCallback = (name) => {
                const location = locations[locIndex];
                location.items.push({
                    name,
                    active: false,
                    order: location.items.length
                });
                saveAllData();
            };
            document.getElementById('dialogTitle').textContent = `Lägg till ny sak i "${locations[locIndex].name}"`;
            document.getElementById('dialogInput').value = '';
            document.getElementById('inputDialog').classList.add('show');
            document.getElementById('dialogInput').focus();
        }

        function appCloseDialog() {
            document.getElementById('inputDialog').classList.remove('show');
            dialogCallback = null;
        }

        function appConfirmDialog() {
            const input = document.getElementById('dialogInput').value.trim();
            if (input && dialogCallback) {
                dialogCallback(input);
                appCloseDialog();
            }
        }

        document.getElementById('dialogInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') appConfirmDialog();
        });

        document.getElementById('toggleFilter').addEventListener('click', () => {
            filterActive = !filterActive;
            document.getElementById('toggleFilter').classList.toggle('active', filterActive);
            document.getElementById('toggleFilter').textContent = filterActive ? 'Visa alla' : 'Visa valda';
            render();
        });

        document.getElementById('toggleEdit').addEventListener('click', () => {
            editMode = !editMode;
            document.getElementById('toggleEdit').classList.toggle('active', editMode);
            document.getElementById('toggleEdit').textContent = editMode ? 'Klar' : 'Redigera';
            render();
        });
    </script>
</body>
</html>
