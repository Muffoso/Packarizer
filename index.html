<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packarizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Righteous:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Favicon och webapp icons -->
    <link rel="icon" type="image/png" href="logo-icon.png">
    <link rel="shortcut icon" type="image/png" href="logo-icon.png">
    <link rel="apple-touch-icon" href="logo-icon.png">
    <link rel="apple-touch-icon" sizes="192x192" href="logo-icon.png">
    <meta name="theme-color" content="#045149">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Packarizer">
    <meta name="msapplication-TileColor" content="#045149">
    <meta name="msapplication-TileImage" content="logo-icon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f2f0e4;
            padding: 10px;
            padding-bottom: 100px;
            color: #045149;
        }

        .auth-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #045149 0%, #003a37 100%);
        }

        .auth-container {
            background: #f2f0e4;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
        }

        .auth-container h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #045149;
            font-size: 32px;
            font-family: 'Righteous', sans-serif;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .auth-form input {
            padding: 12px;
            border: 2px solid #045149;
            border-radius: 5px;
            font-size: 16px;
            width: 100%;
            background: #e6eaef;
            color: #045149;
            font-family: 'Inter', sans-serif;
        }

        .auth-form input:focus {
            outline: none;
            border-color: #bfdbdd;
            box-shadow: 0 0 0 3px rgba(191, 219, 221, 0.3);
        }

        .auth-buttons {
            display: flex;
            gap: 10px;
            flex-direction: column;
        }

        .auth-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .auth-btn.primary {
            background: #045149;
            color: #f2f0e4;
        }

        .auth-btn.primary:hover {
            background: #003a37;
            transform: translateY(-2px);
        }

        .auth-btn.secondary {
            background: #bfdbdd;
            color: #045149;
        }

        .auth-btn.secondary:hover {
            background: #9ec5c6;
            transform: translateY(-2px);
        }

        .auth-btn.google {
            background: #e6eaef;
            color: #045149;
            border: 2px solid #045149;
        }

        .auth-btn.google:hover {
            background: #dae0e5;
            border-color: #045149;
        }

        .auth-toggle {
            text-align: center;
            margin-top: 20px;
            color: #045149;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
        }

        .auth-toggle button {
            background: none;
            border: none;
            color: #21664d;
            cursor: pointer;
            text-decoration: underline;
            padding: 0;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
        }

        .auth-error {
            color: #045149;
            font-size: 14px;
            text-align: center;
            font-family: 'Inter', sans-serif;
        }

        .auth-hidden {
            display: none !important;
        }

        .app-screen {
            display: none;
            padding-top: 165px;
            padding-bottom: 100px;
        }

        .app-screen.show {
            display: block;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: linear-gradient(135deg, #045149 0%, #003a37 100%);
            color: #f2f0e4;
            padding: 15px 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: -4px;
        }

        .header h1 {
            font-size: 32px;
            margin: 0;
            padding: 0;
            font-weight: 700;
            text-align: center;
            color: #bfdbdd;
            font-family: 'Righteous', sans-serif;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
        }

        .h1-text-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
        }

        .user-email {
            font-size: 12px;
            color: #e6eaef;
            font-family: 'Inter', sans-serif;
            letter-spacing: normal;
            font-weight: 400;
            line-height: 1;
        }

        .header-logo {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .header-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .header-content {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 800px;
            margin: 16px auto 0 auto;
            padding-top: 12px;
            border-top: 1px solid #4a8f7f;
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #e6eaef;
            font-family: 'Inter', sans-serif;
            justify-content: center;
        }

        .header-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: start;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .menu-btn {
            background: #21664d;
            color: #f2f0e4;
            padding: 6px 12px;
            font-size: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            position: relative;
        }

        .menu-btn:hover {
            background: #15543c;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            background: #f2f0e4;
            border: 2px solid #045149;
            border-radius: 4px;
            z-index: 1000;
            min-width: 130px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            top: 100%;
            margin-top: 4px;
        }

        .dropdown-menu.show {
            display: flex;
            flex-direction: column;
        }

        .menu-item {
            padding: 8px 12px;
            cursor: pointer;
            color: #045149;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            background: none;
            border: none;
            text-align: left;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .menu-item:hover {
            background: #e6eaef;
        }

        .menu-item:first-child {
            border-radius: 2px 2px 0 0;
        }

        .menu-item:last-child {
            border-radius: 0 0 2px 2px;
        }


        .logout-btn {
            padding: 8px 15px;
            background: #bfdbdd;
            color: #045149;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .logout-btn:hover {
            background: #9ec5c6;
        }

        .logout-menu {
            position: fixed;
            background: #f2f0e4;
            border: 2px solid #045149;
            border-radius: 4px;
            padding: 8px 0;
            z-index: 2000;
            min-width: 120px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .logout-menu-item {
            padding: 8px 16px;
            cursor: pointer;
            color: #045149;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: background 0.2s;
        }

        .logout-menu-item:hover {
            background: #e6eaef;
        }


        .qty-controls {
            display: flex;
            gap: 6px;
            align-items: center;
            margin-right: 8px;
        }

        .qty-buttons {
            display: flex;
            flex-direction: column;
            gap: 3px;
            align-items: center;
        }

        .qty-btn {
            background: #21664d;
            color: #f2f0e4;
            border: none;
            border-radius: 3px;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
        }

        .qty-btn:hover {
            background: #15543c;
        }

        .qty-display {
            min-width: 20px;
            text-align: center;
            font-weight: 600;
            color: #f2f0e4;
        }

        .saved-lists-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1000;
        }

        .saved-lists-modal.show {
            display: flex;
        }

        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
        }

        .modal-content {
            position: relative;
            margin: auto;
            background: #f2f0e4;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            z-index: 1001;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 2px solid #bfdbdd;
        }

        .modal-header h2 {
            color: #045149;
            font-family: 'Righteous', sans-serif;
            font-size: 20px;
            margin: 0;
        }

        .close-modal-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: #045149;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-modal-btn:hover {
            background: #bfdbdd;
            border-radius: 50%;
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .saved-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #e6eaef;
            border-radius: 5px;
            margin-bottom: 10px;
            gap: 10px;
        }

        .saved-list-info {
            flex: 1;
        }

        .saved-list-name {
            font-weight: 600;
            color: #045149;
            margin: 0 0 5px 0;
        }

        .saved-list-date {
            font-size: 11px;
            color: #666;
            margin: 0;
        }

        .saved-list-actions {
            display: flex;
            gap: 5px;
        }

        .load-list-btn, .delete-list-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 3px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
        }

        .load-list-btn {
            background: #21664d;
            color: #f2f0e4;
        }

        .load-list-btn:hover {
            background: #15543c;
        }

        .delete-list-btn {
            background: #d97176;
            color: #f2f0e4;
        }

        .delete-list-btn:hover {
            background: #c85159;
        }

        .no-saved-lists {
            text-align: center;
            padding: 30px 20px;
            color: #666;
            font-style: italic;
        }

        .share-list-btn {
            padding: 6px 10px;
            border: none;
            border-radius: 3px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            background: #bfdbdd;
            color: #045149;
        }

        .share-list-btn:hover {
            background: #9ec5c6;
        }

        .share-dialog-status {
            font-size: 13px;
            margin-bottom: 10px;
            color: #045149;
            min-height: 18px;
        }

        .incoming-section-header {
            font-weight: 700;
            color: #045149;
            font-family: 'Righteous', sans-serif;
            font-size: 15px;
            margin: 15px 0 8px 0;
            padding-top: 10px;
            border-top: 2px solid #bfdbdd;
        }

        .incoming-list-item {
            display: flex;
            flex-direction: column;
            padding: 12px;
            background: #e6eaef;
            border-radius: 5px;
            margin-bottom: 10px;
            gap: 8px;
            border-left: 4px solid #21664d;
        }

        .incoming-list-sender {
            font-size: 11px;
            color: #666;
            margin: 0;
        }

        .incoming-list-name {
            font-weight: 600;
            color: #045149;
            margin: 0;
        }

        .incoming-list-actions {
            display: flex;
            gap: 5px;
        }

        .accept-shared-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 3px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            background: #21664d;
            color: #f2f0e4;
        }

        .accept-shared-btn:hover {
            background: #15543c;
        }

        .decline-shared-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 3px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            background: #d97176;
            color: #f2f0e4;
        }

        .decline-shared-btn:hover {
            background: #c85159;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding-top: 20px;
        }

        .location-section {
            background: #e6eaef;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .location-header {
            background: linear-gradient(135deg, #045149 0%, #003a37 100%);
            color: #bfdbdd;
            padding: 15px;
            font-weight: 600;
            font-size: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            font-family: 'Inter', sans-serif;
        }

        .location-header.edit-mode {
            cursor: grab;
        }

        .location-header.edit-mode:active {
            cursor: grabbing;
        }

        .location-controls {
            display: flex;
            gap: 5px;
        }

        .arrow-btn {
            background: rgba(191, 219, 221, 0.2);
            color: #bfdbdd;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .arrow-btn:hover {
            background: rgba(191, 219, 221, 0.4);
        }

        .delete-location-btn {
            background: #21664d;
            color: #f2f0e4;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .delete-location-btn:hover {
            background: #15543c;
        }

        .items-list {
            padding: 10px;
            display: none;
        }

        .items-list.show {
            display: block;
        }

        .item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #dae0e5;
            gap: 10px;
            transition: background 0.2s;
        }

        .item:last-child {
            border-bottom: none;
        }

        .item.active {
            background: #21664d;
        }

        .item:hover {
            background: #f2f0e4;
        }

        .item.edit-mode:hover {
            background: #e6eaef;
        }

        .item-button {
            flex: 1;
            padding: 12px;
            text-align: left;
            background: none;
            border: 2px solid #045149;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
            color: #045149;
            font-family: 'Inter', sans-serif;
        }

        .item.active .item-button {
            background: #21664d;
            color: #f2f0e4;
            border-color: #21664d;
        }

        .item-button:hover {
            border-color: #bfdbdd;
        }

        .item.edit-mode .item-button {
            cursor: grab;
            border: 2px dashed #045149;
        }

        .item.edit-mode .item-button:active {
            cursor: grabbing;
        }

        .item-controls {
            display: flex;
            gap: 5px;
        }

        .edit-hidden {
            display: none;
        }

        .edit-mode .edit-hidden {
            display: flex;
        }

        .item-arrow-btn {
            background: #21664d;
            color: #f2f0e4;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .item-arrow-btn:hover {
            background: #15543c;
        }

        .delete-item-btn {
            background: #bfdbdd;
            color: #045149;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .delete-item-btn:hover {
            background: #9ec5c6;
        }

        .add-item-btn {
            background: #21664d;
            color: #f2f0e4;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            margin-top: 10px;
            font-family: 'Inter', sans-serif;
        }

        .add-item-btn:hover {
            background: #15543c;
        }

        .add-location-btn {
            background: #21664d;
            color: #f2f0e4;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            margin-top: 20px;
            font-family: 'Inter', sans-serif;
        }

        .add-location-btn:hover {
            background: #15543c;
        }

        .input-dialog {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .input-dialog.show {
            display: flex;
        }

        .dialog-content {
            background: #f2f0e4;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 20px 25px rgba(0,0,0,0.15);
            width: 90%;
            max-width: 400px;
        }

        .dialog-content h2 {
            margin-bottom: 15px;
            color: #045149;
            font-family: 'Inter', sans-serif;
        }

        .dialog-content input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 2px solid #045149;
            border-radius: 5px;
            font-size: 16px;
            background: #e6eaef;
            color: #045149;
            font-family: 'Inter', sans-serif;
        }

        .dialog-buttons {
            display: flex;
            gap: 10px;
        }

        .dialog-buttons button {
            flex: 1;
            padding: 10px;
            font-family: 'Inter', sans-serif;
        }

        .dialog-buttons .cancel-btn {
            background: #21664d;
            color: #f2f0e4;
        }

        .dialog-buttons .cancel-btn:hover {
            background: #15543c;
        }

        .dialog-buttons .confirm-btn {
            background: #bfdbdd;
            color: #045149;
        }

        .dialog-buttons .confirm-btn:hover {
            background: #9ec5c6;
        }

        .filter-active-only {
            display: none;
        }

        .show-active-only .filter-active-only {
            display: block;
        }

        .show-active-only .item:not(.active) {
            display: none;
        }

        .show-active-only .location-section {
            display: none;
        }

        .show-active-only .location-section .item.active {
            display: flex;
        }

        .show-active-only .location-section:has(.item.active) {
            display: block;
        }
    </style>
</head>
<body>
    <!-- Auth Screen -->
    <div class="auth-screen" id="authScreen">
        <div class="auth-container">
            <h1>PACKARIZER</h1>

            <div id="loginForm">
                <div class="auth-form">
                    <input type="email" id="email" placeholder="Email" />
                    <input type="password" id="password" placeholder="Lösenord" />
                    <button class="auth-btn primary" onclick="appLogin()">Logga in</button>
                    <button class="auth-btn secondary" onclick="appGoogleSignIn()">Logga in med Google</button>
                    <div class="auth-error" id="authError"></div>
                </div>
                <div class="auth-toggle">
                    Inget konto? <button onclick="appToggleForm()">Registrera</button>
                </div>
            </div>

            <div id="registerForm" class="auth-hidden">
                <div class="auth-form">
                    <input type="email" id="regEmail" placeholder="Email" />
                    <input type="password" id="regPassword" placeholder="Lösenord (minst 6 tecken)" />
                    <input type="password" id="regPasswordConfirm" placeholder="Bekräfta lösenord" />
                    <button class="auth-btn primary" onclick="appRegister()">Skapa konto</button>
                    <button class="auth-btn secondary" onclick="appGoogleSignIn()">Registrera med Google</button>
                    <div class="auth-error" id="authError2"></div>
                </div>
                <div class="auth-toggle">
                    Redan konto? <button onclick="appToggleForm()">Logga in</button>

        function setupFirebaseListeners() {
            auth = firebase.auth();
            database = firebase.database();

            auth.onAuthStateChanged(user => {
                if (user) {
                    currentUser = user;
                    document.getElementById('authScreen').classList.add('auth-hidden');
                    document.getElementById('appScreen').classList.add('show');
                    document.getElementById('userEmail').textContent = user.email;

                    // Write email→uid index for sharing functionality
                    if (user.email) {
                        const sanitizedEmail = user.email.replace(/\./g, ',');
                        database.ref(`emailIndex/${sanitizedEmail}`).set({ uid: user.uid });
                    }

                    initializeNewUserData(user);
                    listenToDataChanges(user);
                    editMode = false;
                    filterActive = false;
                    document.getElementById('filterAllBtn').classList.add('active');
                    document.getElementById('filterSelectedBtn').classList.remove('active');
                    document.getElementById('toggleEdit').classList.remove('active');
                    document.getElementById('toggleEdit').textContent = 'Redigera';
                } else {
                    currentUser = null;
                    locations = [];
                    document.getElementById('authScreen').classList.remove('auth-hidden');
                    document.getElementById('appScreen').classList.remove('show');
                    document.getElementById('email').value = '';
                    document.getElementById('password').value = '';
                    document.getElementById('regEmail').value = '';
                    document.getElementById('regPassword').value = '';
                    document.getElementById('regPasswordConfirm').value = '';
                }
            });
        }

        function initializeNewUserData(user) {
            const uid = user.uid;
            const email = user.email;
            database.ref(`users/${uid}/locations`).once('value', snapshot => {
                if (!snapshot.exists()) {
                    if (email === 'stallberg.anders@gmail.com') {
                        database.ref(`users/${uid}/locations`).set(DEFAULT_LOCATIONS);
                    } else {
                        database.ref(`users/${uid}/locations`).set({});
                    }
                }
            });
        }

        function listenToDataChanges(user) {
            database.ref(`users/${user.uid}/locations`).on('value', snapshot => {
                const data = snapshot.val();
                if (data) {
                    locations = Object.entries(data).map(([name, locationData]) => ({
                        name,
                        order: locationData.order,
                        items: Object.entries(locationData.items || {}).map(([itemName, itemData]) => ({
                            name: itemName,
                            active: itemData.active,
                            order: itemData.order,
                            quantity: itemData.quantity || 1
                        })).sort((a, b) => a.order - b.order)
                    })).sort((a, b) => a.order - b.order);
                } else {
                    locations = [];
                }
                render();
            });
        }

        // Auth functions
        function appToggleForm() {
            document.getElementById('loginForm').classList.toggle('auth-hidden');
            document.getElementById('registerForm').classList.toggle('auth-hidden');
            document.getElementById('authError').textContent = '';
            document.getElementById('authError2').textContent = '';
        }

        function appLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) {
                document.getElementById('authError').textContent = 'Fyll i email och lösenord';
                return;
            }
            auth.signInWithEmailAndPassword(email, password).catch(error => {
                document.getElementById('authError').textContent = 'Fel email eller lösenord';
            });
        }

        function appRegister() {
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const passwordConfirm = document.getElementById('regPasswordConfirm').value;
            if (!email || !password || !passwordConfirm) {
                document.getElementById('authError2').textContent = 'Fyll i alla fält';
                return;
            }
            if (password !== passwordConfirm) {
                document.getElementById('authError2').textContent = 'Lösenorden stämmer inte överens';
                return;
            }
            if (password.length < 6) {
                document.getElementById('authError2').textContent = 'Lösenordet måste vara minst 6 tecken';
                return;
            }
            auth.createUserWithEmailAndPassword(email, password).catch(error => {
                document.getElementById('authError2').textContent = 'Email redan registrerat eller felaktig email';
            });
        }

        function appGoogleSignIn() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(error => {
                document.getElementById('authError').textContent = 'Google-inloggning misslyckades';
            });
        }

        function appLogout() {
            auth.signOut();
            appCloseLogoutMenu();
        }

        function appShowLogoutMenu() {
            const emailEl = document.getElementById('userEmail');
            const rect = emailEl.getBoundingClientRect();

            // Remove existing menu if any
            const existingMenu = document.getElementById('logoutMenu');
            if (existingMenu) existingMenu.remove();

            const menu = document.createElement('div');
            menu.id = 'logoutMenu';
            menu.className = 'logout-menu';
            menu.style.top = (rect.bottom + 5) + 'px';
            menu.style.left = (rect.left - 30) + 'px';

            const logoutItem = document.createElement('div');
            logoutItem.className = 'logout-menu-item';
            logoutItem.textContent = 'Logga ut';
            logoutItem.onclick = appLogout;

            menu.appendChild(logoutItem);
            document.body.appendChild(menu);

            // Close menu when clicking outside
            document.addEventListener('click', appCloseLogoutMenuOnClickOutside);
        }

        function appCloseLogoutMenuOnClickOutside(e) {
            const menu = document.getElementById('logoutMenu');
            const emailEl = document.getElementById('userEmail');
            if (menu && e.target !== emailEl && !menu.contains(e.target)) {
                appCloseLogoutMenu();
            }
        }

        function appCloseLogoutMenu() {
            const menu = document.getElementById('logoutMenu');
            if (menu) {
                menu.remove();
                document.removeEventListener('click', appCloseLogoutMenuOnClickOutside);
            }
        }

        // App functions
        function appChangeQty(locIndex, itemIndex, delta) {
            const item = locations[locIndex].items[itemIndex];
            const newQty = (item.quantity || 1) + delta;
            if (newQty >= 1) {
                item.quantity = newQty;
                saveAllData();
            }
        }

        function saveAllData() {
            if (!currentUser) return;
            const data = {};
            locations.forEach(location => {
                data[location.name] = {
                    order: location.order,
                    items: {}
                };
                location.items.forEach(item => {
                    data[location.name].items[item.name] = {
                        active: item.active,
                        order: item.order,
                        quantity: item.quantity || 1
                    };
                });
            });
            database.ref(`users/${currentUser.uid}/locations`).set(data);
        }

        function render() {
            const container = document.getElementById('container');
            container.innerHTML = '';

            locations.forEach((location, locIndex) => {
                const section = document.createElement('div');
                section.className = 'location-section';

                const header = document.createElement('div');
                header.className = `location-header ${editMode ? 'edit-mode' : ''}`;

                header.innerHTML = `
                    <span>${location.name}</span>
                    <div class="location-controls ${editMode ? '' : 'edit-hidden'}">
                        <button class="arrow-btn" onclick="appMoveLocation(${locIndex}, -1)" ${locIndex === 0 ? 'disabled' : ''}>⬆️</button>
                        <button class="arrow-btn" onclick="appMoveLocation(${locIndex}, 1)" ${locIndex === locations.length - 1 ? 'disabled' : ''}>⬇️</button>
                        <button class="delete-location-btn" onclick="appDeleteLocation(${locIndex})">✕</button>
                    </div>
                `;

                header.addEventListener('click', () => {
                    const itemsList = section.querySelector('.items-list');
                    itemsList.classList.toggle('show');
                });

                section.appendChild(header);

                const itemsList = document.createElement('div');
                itemsList.className = 'items-list show';

                location.items.forEach((item, itemIndex) => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = `item ${item.active ? 'active' : ''} ${editMode ? 'edit-mode' : ''}`;

                    const qtyHtml = item.active && !editMode ? `
                        <span class="qty-controls">
                            <div class="qty-buttons">
                                <button class="qty-btn plus" onclick="appChangeQty(${locIndex}, ${itemIndex}, 1)">+</button>
                                <button class="qty-btn minus" onclick="appChangeQty(${locIndex}, ${itemIndex}, -1)">−</button>
                            </div>
                            <span class="qty-display">${item.quantity || 1}</span>
                        </span>
                    ` : '';

                    itemDiv.innerHTML = `
                        ${qtyHtml}
                        <button class="item-button" onclick="appToggleItem(${locIndex}, ${itemIndex})">${item.name}</button>
                        <div class="item-controls edit-hidden">
                            <button class="item-arrow-btn" onclick="appMoveItem(${locIndex}, ${itemIndex}, -1)" ${itemIndex === 0 ? 'disabled' : ''}>⬆️</button>
                            <button class="item-arrow-btn" onclick="appMoveItem(${locIndex}, ${itemIndex}, 1)" ${itemIndex === location.items.length - 1 ? 'disabled' : ''}>⬇️</button>
                            <button class="delete-item-btn" onclick="appDeleteItem(${locIndex}, ${itemIndex})">✕</button>
                        </div>
                    `;

                    itemsList.appendChild(itemDiv);
                });

                if (editMode) {
                    const addItemBtn = document.createElement('button');
                    addItemBtn.className = 'add-item-btn';
                    addItemBtn.textContent = '+ Lägg till sak';
                    addItemBtn.onclick = () => appShowAddItemDialog(locIndex);
                    itemsList.appendChild(addItemBtn);
                }

                section.appendChild(itemsList);
                container.appendChild(section);
            });

            if (editMode) {
                const addLocationBtn = document.createElement('button');
                addLocationBtn.className = 'add-location-btn';
                addLocationBtn.textContent = '+ Lägg till plats';
                addLocationBtn.onclick = () => appShowAddLocationDialog();
                container.appendChild(addLocationBtn);
            }

            if (filterActive) {
                container.classList.add('show-active-only');
            } else {
                container.classList.remove('show-active-only');
            }

            if (editMode) {
                container.classList.add('edit-mode');
            } else {
                container.classList.remove('edit-mode');
            }

            appUpdateFilterCounts();
        }

        function appToggleItem(locIndex, itemIndex) {
            if (!editMode) {
                locations[locIndex].items[itemIndex].active = !locations[locIndex].items[itemIndex].active;
                if (!locations[locIndex].items[itemIndex].active) {
                    locations[locIndex].items[itemIndex].quantity = 1;
                }
                saveAllData();

                if (!filterActive) {
                    setTimeout(() => {
                        const items = document.querySelectorAll('.item');
                        let itemElement = null;
                        let itemCount = 0;

                        for (let i = 0; i < locations.length; i++) {
                            for (let j = 0; j < locations[i].items.length; j++) {
                                if (i === locIndex && j === itemIndex) {
                                    itemElement = items[itemCount];
                                    break;
                                }
                                itemCount++;
                            }
                            if (itemElement) break;
                        }

                        if (itemElement) {
                            const rect = itemElement.getBoundingClientRect();
                            const windowHeight = window.innerHeight;
                            const targetPosition = windowHeight * 0.25;
                            const offset = rect.top - targetPosition;
                            window.scrollBy({ top: offset, behavior: 'smooth' });
                        }
                    }, 0);
                }
            }
        }

        function appMoveLocation(locIndex, direction) {
            const newIndex = locIndex + direction;
            if (newIndex >= 0 && newIndex < locations.length) {
                [locations[locIndex], locations[newIndex]] = [locations[newIndex], locations[locIndex]];
                locations.forEach((loc, i) => loc.order = i);
                saveAllData();
            }
        }

        function appMoveItem(locIndex, itemIndex, direction) {
            const newIndex = itemIndex + direction;
            const items = locations[locIndex].items;
            if (newIndex >= 0 && newIndex < items.length) {
                [items[itemIndex], items[newIndex]] = [items[newIndex], items[itemIndex]];
                items.forEach((item, i) => item.order = i);
                saveAllData();
            }
        }

        function appDeleteLocation(locIndex) {
            if (confirm(`Vill du ta bort "${locations[locIndex].name}"?`)) {
                locations.splice(locIndex, 1);
                locations.forEach((loc, i) => loc.order = i);
                saveAllData();
            }
        }

        function appDeleteItem(locIndex, itemIndex) {
            const itemName = locations[locIndex].items[itemIndex].name;
            if (confirm(`Vill du ta bort "${itemName}"?`)) {
                locations[locIndex].items.splice(itemIndex, 1);
                locations[locIndex].items.forEach((item, i) => item.order = i);
                saveAllData();
            }
        }

        function appShowAddLocationDialog() {
            dialogCallback = (name) => {
                locations.push({
                    name,
                    order: locations.length,
                    items: []
                });
                saveAllData();
            };
            document.getElementById('dialogTitle').textContent = 'Lägg till ny plats';
            document.getElementById('dialogInput').value = '';
            document.getElementById('inputDialog').classList.add('show');
            document.getElementById('dialogInput').focus();
        }

        function appShowAddItemDialog(locIndex) {
            dialogCallback = (name) => {
                const location = locations[locIndex];
                location.items.push({
                    name,
                    active: false,
                    order: location.items.length,
                    quantity: 1
                });
                saveAllData();
            };
            document.getElementById('dialogTitle').textContent = `Lägg till ny sak i "${locations[locIndex].name}"`;
            document.getElementById('dialogInput').value = '';
            document.getElementById('inputDialog').classList.add('show');
            document.getElementById('dialogInput').focus();
        }

        function appCloseDialog() {
            document.getElementById('inputDialog').classList.remove('show');
            dialogCallback = null;
        }

        function appConfirmDialog() {
            const input = document.getElementById('dialogInput').value.trim();
            if (input && dialogCallback) {
                dialogCallback(input);
                appCloseDialog();
            }
        }

        document.getElementById('dialogInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') appConfirmDialog();
        });

        function appSetFilter(mode) {
            filterActive = (mode === 'selected');
            appUpdateFilterCounts();
            render();
        }

        function appToggleEdit() {
            editMode = !editMode;
            render();
            appUpdateFilterCounts();
        }

        function appToggleVisaMenu() {
            const menu = document.getElementById('visaMenu');
            menu.classList.toggle('show');
            const listorMenu = document.getElementById('listorMenu');
            listorMenu.classList.remove('show');
        }

        function appToggleListorMenu() {
            const menu = document.getElementById('listorMenu');
            menu.classList.toggle('show');
            const visaMenu = document.getElementById('visaMenu');
            visaMenu.classList.remove('show');
        }

        function appShowSaveListDialog() {
            dialogCallback = (name) => {
                appSaveList(name);
            };
            document.getElementById('dialogTitle').textContent = 'Spara packlista';
            document.getElementById('dialogInput').value = '';
            document.getElementById('inputDialog').classList.add('show');
            document.getElementById('dialogInput').focus();
        }

        function appUpdateFilterCounts() {
            const totalCount = locations.reduce((sum, loc) => sum + loc.items.length, 0);
            const selectedCount = locations.reduce((sum, loc) => sum + loc.items.filter(i => i.active).length, 0);
            document.getElementById('totalCount').textContent = totalCount;
            document.getElementById('selectedCount').textContent = selectedCount;
        }

        // Close menus when clicking outside
        document.addEventListener('click', (e) => {
            const visaMenu = document.getElementById('visaMenu');
            const listorMenu = document.getElementById('listorMenu');
            const visaBtn = document.getElementById('visaMenuBtn');
            const listorBtn = document.getElementById('listorMenuBtn');

            if (!visaBtn.contains(e.target) && !visaMenu.contains(e.target)) {
                visaMenu.classList.remove('show');
            }
            if (!listorBtn.contains(e.target) && !listorMenu.contains(e.target)) {
                listorMenu.classList.remove('show');
            }
        });

        function appSaveList(name) {
            const activeItems = [];
            locations.forEach(loc => {
                loc.items.forEach(item => {
                    if (item.active) {
                        activeItems.push({
                            location: loc.name,
                            name: item.name,
                            quantity: item.quantity || 1
                        });
                    }
                });
            });
            const timestamp = Date.now();
            database.ref(`users/${currentUser.uid}/savedLists/${timestamp}`).set({
                name,
                createdAt: timestamp,
                items: activeItems
            });
            appCloseDialog();
        }

        function appShowSavedListsModal() {
            const container = document.getElementById('savedListsContainer');
            container.innerHTML = '<div style="text-align:center;color:#666;padding:20px;">Laddar...</div>';
            document.getElementById('savedListsModal').classList.add('show');

            Promise.all([
                database.ref(`users/${currentUser.uid}/savedLists`).once('value'),
                database.ref(`sharedLists/${currentUser.uid}/incoming`).once('value')
            ]).then(([ownSnapshot, incomingSnapshot]) => {
                container.innerHTML = '';

                // Incoming shared lists (show first)
                const incoming = incomingSnapshot.val();
                if (incoming) {
                    const pendingEntries = Object.entries(incoming).filter(([, v]) => v.status === 'pending');
                    if (pendingEntries.length > 0) {
                        const sectionHeader = document.createElement('div');
                        sectionHeader.className = 'incoming-section-header';
                        sectionHeader.textContent = 'Delade med dig';
                        container.appendChild(sectionHeader);

                        pendingEntries.forEach(([key, shared]) => {
                            const date = new Date(shared.createdAt).toLocaleDateString('sv-SE');
                            const incomingDiv = document.createElement('div');
                            incomingDiv.className = 'incoming-list-item';
                            incomingDiv.innerHTML = `
                                <p class="incoming-list-name">${shared.listName}</p>
                                <p class="incoming-list-sender">Från: ${shared.senderEmail} &nbsp;·&nbsp; ${date}</p>
                                <div class="incoming-list-actions">
                                    <button class="accept-shared-btn" onclick="appAcceptSharedList('${key}')">Acceptera</button>
                                    <button class="decline-shared-btn" onclick="appDeclineSharedList('${key}')">Avvisa</button>
                                </div>
                            `;
                            container.appendChild(incomingDiv);
                        });
                    }
                }

                // Own saved lists (sorted by createdAt, newest first)
                const lists = ownSnapshot.val();
                if (!lists || Object.keys(lists).length === 0) {
                    if (!container.hasChildNodes()) {
                        container.innerHTML = '<div class="no-saved-lists">Ingen sparad packlista än</div>';
                    }
                } else {
                    // Sort by createdAt in descending order (newest first)
                    const sortedEntries = Object.entries(lists).sort((a, b) => b[1].createdAt - a[1].createdAt);
                    sortedEntries.forEach(([key, list]) => {
                        const date = new Date(list.createdAt).toLocaleDateString('sv-SE');
                        const item = document.createElement('div');
                        item.className = 'saved-list-item';
                        item.innerHTML = `
                            <div class="saved-list-info">
                                <p class="saved-list-name">${list.name}</p>
                                <p class="saved-list-date">${date}</p>
                            </div>
                            <div class="saved-list-actions">
                                <button class="load-list-btn" onclick="appLoadList('${key}')">Ladda</button>
                                <button class="share-list-btn" onclick="appOpenShareDialog('${key}', '${list.name.replace(/'/g, "\\'")}')">Dela</button>
                                <button class="delete-list-btn" onclick="appDeleteList('${key}')">Radera</button>
                            </div>
                        `;
                        container.appendChild(item);
                    });
                }
            });
        }

        function appCloseSavedListsModal() {
            document.getElementById('savedListsModal').classList.remove('show');
        }

        function appLoadList(listKey) {
            database.ref(`users/${currentUser.uid}/savedLists/${listKey}`).once('value', snapshot => {
                const list = snapshot.val();
                if (list && list.items) {
                    // Deactivate all items
                    locations.forEach(loc => {
                        loc.items.forEach(item => {
                            item.active = false;
                            item.quantity = 1;
                        });
                    });

                    // Activate and set quantity for saved items
                    list.items.forEach(saved => {
                        const loc = locations.find(l => l.name === saved.location);
                        if (loc) {
                            const item = loc.items.find(i => i.name === saved.name);
                            if (item) {
                                item.active = true;
                                item.quantity = saved.quantity || 1;
                            }
                        }
                    });

                    saveAllData();
                    appCloseSavedListsModal();
                }
            });
        }

        function appDeleteList(listKey) {
            if (confirm('Vill du radera denna packlista?')) {
                database.ref(`users/${currentUser.uid}/savedLists/${listKey}`).remove();
                appShowSavedListsModal();
            }
        }

        // Share dialog state
        let shareTargetListKey = null;
        let shareTargetListName = null;

        function appOpenShareDialog(listKey, listName) {
            shareTargetListKey = listKey;
            shareTargetListName = listName;
            document.getElementById('shareDialogListName').textContent = `"${listName}"`;
            document.getElementById('shareEmailInput').value = '';
            document.getElementById('shareDialogStatus').textContent = '';

            // Populate favorite emails datalist
            const datalist = document.getElementById('favoriteEmailsList');
            datalist.innerHTML = '';
            database.ref(`users/${currentUser.uid}/favoriteEmails`).once('value', snapshot => {
                const favs = snapshot.val();
                if (favs) {
                    Object.values(favs).forEach(emailObj => {
                        const option = document.createElement('option');
                        option.value = emailObj.email;
                        datalist.appendChild(option);
                    });
                }
            });

            document.getElementById('shareDialog').classList.add('show');
            document.getElementById('shareEmailInput').focus();
        }

        function appCloseShareDialog() {
            document.getElementById('shareDialog').classList.remove('show');
            shareTargetListKey = null;
            shareTargetListName = null;
        }

        function appConfirmShare() {
            const email = document.getElementById('shareEmailInput').value.trim().toLowerCase();
            if (!email) {
                document.getElementById('shareDialogStatus').textContent = 'Ange en email-adress.';
                return;
            }
            if (email === currentUser.email.toLowerCase()) {
                document.getElementById('shareDialogStatus').textContent = 'Du kan inte dela med dig själv.';
                return;
            }

            document.getElementById('shareDialogStatus').textContent = 'Söker efter användare...';

            const sanitizedEmail = email.replace(/\./g, ',');
            database.ref(`emailIndex/${sanitizedEmail}`).once('value', snapshot => {
                const data = snapshot.val();
                if (!data || !data.uid) {
                    document.getElementById('shareDialogStatus').textContent = 'Ingen användare hittades med den emailen.';
                    return;
                }

                const recipientUid = data.uid;

                // Read the list data
                database.ref(`users/${currentUser.uid}/savedLists/${shareTargetListKey}`).once('value', listSnapshot => {
                    const list = listSnapshot.val();
                    if (!list) {
                        document.getElementById('shareDialogStatus').textContent = 'Listan hittades inte.';
                        return;
                    }

                    const sharedKey = Date.now();
                    const payload = {
                        senderEmail: currentUser.email,
                        listName: list.name,
                        createdAt: sharedKey,
                        items: list.items || [],
                        status: 'pending'
                    };

                    database.ref(`sharedLists/${recipientUid}/incoming/${sharedKey}`).set(payload)
                        .then(() => {
                            appSaveFavoriteEmail(email);
                            document.getElementById('shareDialogStatus').textContent = 'Delad!';
                            setTimeout(() => appCloseShareDialog(), 1200);
                        })
                        .catch(() => {
                            document.getElementById('shareDialogStatus').textContent = 'Något gick fel. Försök igen.';
                        });
                });
            });
        }

        function appSaveFavoriteEmail(email) {
            const sanitized = email.replace(/\./g, ',');
            database.ref(`users/${currentUser.uid}/favoriteEmails/${sanitized}`).set({ email: email });
        }

        function appAcceptSharedList(incomingKey) {
            database.ref(`sharedLists/${currentUser.uid}/incoming/${incomingKey}`).once('value', snapshot => {
                const shared = snapshot.val();
                if (!shared) return;

                // Save as own saved list
                const timestamp = Date.now();
                database.ref(`users/${currentUser.uid}/savedLists/${timestamp}`).set({
                    name: shared.listName,
                    createdAt: timestamp,
                    items: shared.items || []
                }).then(() => {
                    // Mark as accepted
                    database.ref(`sharedLists/${currentUser.uid}/incoming/${incomingKey}`).update({ status: 'accepted' });
                    appShowSavedListsModal(); // refresh
                });
            });
        }

        function appDeclineSharedList(incomingKey) {
            database.ref(`sharedLists/${currentUser.uid}/incoming/${incomingKey}`).update({ status: 'declined' })
                .then(() => {
                    appShowSavedListsModal(); // refresh
                });
        }
    </script>
</body>
</html>
